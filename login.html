<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Entrar — Salve Comida</title>
 <link rel="stylesheet" href="css/style.css">
 <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" href="img/salve_comida_logo_final/favicon/favicon.svg" type="image/svg+xml">
</head>
<body>
<div class="auth-page">
 <div class="auth-card">
 <div class="auth-logo">
 <a href="index.html"><img src="img/salve_comida_logo_final/svg/logo-horizontal.svg" alt="Salve Comida" height="38" style="display:block"></a>
 </div>

 <h2 class="auth-title">Bem-vindo de volta!</h2>
 <p class="auth-subtitle">Entre com seu e-mail e senha para continuar.</p>

 <div id="login-alert"></div>

 <form id="login-form" novalidate>
 <div class="form-group">
 <label for="email">E-mail <span class="required">*</span></label>
 <input type="email" id="email" name="email" class="form-control"
 placeholder="seu@email.com" required autocomplete="email">
 <span class="error-msg">Informe um e-mail válido.</span>
 </div>
 <div class="form-group">
 <label for="password">Senha <span class="required">*</span></label>
 <div class="input-icon-right">
 <input type="password" id="password" name="password" class="form-control"
 placeholder="Sua senha" required autocomplete="current-password">
 <button type="button" class="toggle-pw" id="toggle-pw" title="Mostrar/ocultar senha"></button>
 </div>
 <span class="error-msg">Informe a senha.</span>
 </div>

 <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:0.5rem">
 Entrar
 </button>
 </form>

 <div class="auth-footer" style="margin-top:0.75rem;text-align:right">
 <a href="esqueci-senha.html" style="font-size:0.85rem;color:var(--grey-mid)">Esqueci minha senha</a>
 </div>

 <div class="auth-divider">ou</div>

 <div style="background:var(--grey-pale);border-radius:var(--radius-sm);padding:1rem;font-size:0.85rem;color:var(--grey-mid)">
 <strong style="color:var(--grey-dark)">Novo aqui? </strong><a href="cadastro.html" style="color:var(--green-main)"> Crie sua conta gratuitamente</a> em segundos.
 </div>

 <div class="auth-footer" style="margin-top:0.5rem">
 <a href="index.html" style="color:var(--grey-mid)">← Voltar ao início</a>
 </div>
 </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
 // Se já logado, redireciona
 if (Auth.getToken()) {
 Auth.fetchCurrentUser().then(function(u) {
 if (u) location.replace(sessionStorage.getItem('sc_after_login') || 'index.html');
 });
 }

 document.getElementById('toggle-pw').addEventListener('click', function() {
 var pw = document.getElementById('password');
 pw.type = pw.type === 'password' ? 'text' : 'password';
 });

 var form = document.getElementById('login-form');
 var btn = form.querySelector('[type=submit]');

 form.addEventListener('submit', async function(e) {
 e.preventDefault();
 var email = form.email.value.trim();
 var password = form.password.value;

 if (!email || !password) {
 showAlert('E-mail e senha são obrigatórios.', 'error'); return;
 }

 btn.disabled = true;
 btn.textContent = 'Entrando...';

 try {
 var result = await Api.auth.login({ email: email, password: password });
 Auth.setToken(result.token);
 Auth.setCachedUser(result.user);
 showAlert(' Login realizado! Redirecionando...', 'success');
 setTimeout(function() {
 var dest = sessionStorage.getItem('sc_after_login') || 'index.html';
 sessionStorage.removeItem('sc_after_login');
 location.replace(dest);
 }, 900);
 } catch(err) {
 showAlert(err.message || 'Erro ao entrar.', 'error');
 btn.disabled = false;
 btn.innerHTML = ' Entrar';
 }
 });

 function showAlert(msg, type) {
 var el = document.getElementById('login-alert');
 var icons = { success:'', error:'' };
 el.innerHTML = '<div class="alert alert-' + type + '">' + (icons[type]||'') + ' ' + msg + '</div>';
 if (type !== 'success') setTimeout(function(){ el.innerHTML = ''; }, 5000);
 }
});
</script>
</body>
</html>
